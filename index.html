<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riva.bot-fabri.uk - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(8, 8, 10, 0.82), rgba(8, 8, 10, 0.92)), url('backgroundriva.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen text-[#f5f5f7] flex flex-col justify-between overflow-x-hidden bg-[#08080a]">

    <div class="h-12 w-full"></div>

    <main class="flex-1 flex flex-col justify-center items-center px-6 text-center max-w-4xl mx-auto w-full">

        <h1 class="text-3xl sm:text-4xl md:text-5xl font-semibold tracking-tight mb-8 select-none">
            <span class="bg-gradient-to-r from-emerald-400 to-emerald-600 bg-clip-text text-transparent font-extrabold">Riva</span><span class="text-slate-200 font-medium">.bot-fabri</span><span class="bg-gradient-to-r from-indigo-400 to-indigo-500 bg-clip-text text-transparent font-semibold">.uk</span>
        </h1>

        <p class="text-slate-400 text-sm sm:text-base max-w-md mb-10 leading-relaxed">
            Piattaforma protetta dedicata alla consultazione e archiviazione della reportistica settimanale.
        </p>
        <a href="https://drive.google.com/drive/folders/1nJqBKaTXcNUc_PAVY2vpqxDjiwto-Pgy?usp=sharing" 
           target="_blank"
           class="group relative inline-flex items-center justify-center px-10 py-4 rounded-full text-white font-bold text-sm tracking-wide transition-all duration-300 transform hover:-translate-y-0.5 bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 shadow-lg hover:shadow-emerald-950/30">
            <span class="flex items-center gap-2">
                Accedi all'archivio dei Report
                <svg class="w-4 h-4 transform group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </span>
        </a>

        <div class="mt-14 flex items-center gap-2.5 bg-white/[0.02] border border-white/[0.05] px-5 py-3 rounded-full">
            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-xs text-slate-400 tracking-wide">
                I nuovi report vengono pubblicati automaticamente ogni lunedì alle ore 02:00.
            </span>
        </div>

    </main>

    <footer class="w-full text-center py-8 text-xs text-slate-600 border-t border-white/[0.01]">
        <p>&copy; 2026 Riva.bot-fabri.uk. Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
